name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Needed to attach binaries to a GitHub Release on tag pushes
permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake g++ libssl-dev zlib1g-dev

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSEQAN3_NO_BZIP2=ON \
            -DSEQAN3_NO_CEREAL=ON \
            -DSHARG_NO_BZIP2=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Verify static linking
        run: |
          file build/fastq2sam build/split_fastq
          file build/fastq2sam | grep -q "statically linked"
          file build/split_fastq | grep -q "statically linked"

      - name: Package
        run: |
          pkg="fastq2sam-linux-${{ matrix.arch }}"
          mkdir -p "dist/$pkg"
          cp build/fastq2sam build/split_fastq LICENSE readme.md "dist/$pkg/"
          tar -czf "dist/$pkg.tar.gz" -C dist "$pkg"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastq2sam-linux-${{ matrix.arch }}
          path: dist/fastq2sam-linux-${{ matrix.arch }}.tar.gz

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fastq2sam-linux-${{ matrix.arch }}.tar.gz
